      --bg-card: #1a1f2e;
      --bg-hover: #252b3d;
      --border: #2d3748;
      --text-primary: #f9fafb;
      --text-secondary: #d1d5db;
      --text-muted: #9ca3af;
      --accent-blue: #3b82f6;
      --accent-green: #10b981;
      --accent-purple: #8b5cf6;
      --accent-orange: #f59e0b;
      --success: #10b981;
      --warning: #f59e0b;

      color: var(--text-primary);

      -webkit-font-smoothing: antialiased;

      text-align: center;
      padding: 48px 24px;
      background: rgba(26, 31, 46, 0.8);
      backdrop-filter: blur(20px);
      border-radius: 20px;
      margin-bottom: 32px;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }
    
    .header h1 {
      font-size: 48px;
      font-weight: 800;
      margin-bottom: 12px;
      background: linear-gradient(135deg, #60a5fa 0%, #a78bfa 50%, #f472b6 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    
    .header p {
      font-size: 16px;
      color: var(--text-secondary);
    }

    /* Search and Filters */
    .controls {
      background: rgba(26, 31, 46, 0.7);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 32px;
    }

    .search-bar {
      position: relative;
      margin-bottom: 20px;
    }

    .search-icon {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 18px;
      pointer-events: none;
      opacity: 0.5;
    }

    .search-input {
      width: 100%;
      padding: 14px 20px 14px 48px;
      background: rgba(31, 41, 55, 0.6);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      color: var(--text-primary);
      font-size: 15px;
      outline: none;
      transition: all 0.2s ease;
    }

    .search-input:focus {
      background: rgba(31, 41, 55, 0.8);
      border-color: rgba(59, 130, 246, 0.5);
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
    }

    .search-input::placeholder {
      color: var(--text-muted);
    }

    .filters-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 12px;
      margin-bottom: 16px;
    }

    .filter-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .filter-label {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .filter-select {

      background: rgba(31, 41, 55, 0.6);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 10px;
      color: var(--text-primary);
      font-size: 14px;
      outline: none;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .filter-select:hover {
      background: rgba(31, 41, 55, 0.8);
      border-color: rgba(255, 255, 255, 0.2);
    }

    .filter-select:focus {
      border-color: rgba(59, 130, 246, 0.5);
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
    }

    .results-bar {

      justify-content: space-between;
      align-items: center;
      padding-top: 16px;
      border-top: 1px solid rgba(255, 255, 255, 0.1);

    .results-count {

      color: var(--text-secondary);
    }

      border-radius: 8px;
      color: #f87171;

      font-weight: 600;

    .clear-filters:hover {

      border-radius: 10px;
      padding: 14px 16px;
      margin-bottom: 8px;

      transition: all 0.2s ease;

    .capability:hover {

      border-color: rgba(59, 130, 246, 0.3);
      transform: translateX(4px);

    .capability-name {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 4px;

    .capability-desc {
      font-size: 12px;
      color: var(--text-muted);
      line-height: 1.4;
      display: none;
    }

      margin-top: 8px;
      padding-top: 8px;
      border-top: 1px solid rgba(255, 255, 255, 0.05);
    }

      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(4px);
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      animation: fadeIn 0.2s ease;
    }
    
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    
    .modal {
      background: rgba(17, 24, 39, 0.95);
      backdrop-filter: blur(30px);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 20px;
      max-width: 700px;
      width: 100%;
      max-height: 90vh;
      overflow-y: auto;
      animation: slideUp 0.3s ease;
    }
    
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }

    .modal-header {
      padding: 32px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);

      font-weight: 700;

      height: 36px;
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      background: rgba(31, 41, 55, 0.8);
      color: var(--text-secondary);
      font-size: 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;

    .close-btn:hover {

      border-color: rgba(59, 130, 246, 0.4);
      color: var(--text-primary);
    }

    .modal-body {
      padding: 32px;
    }

    .modal-section {
      margin-bottom: 32px;
    }

    .section-title {
      font-size: 14px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
      margin-bottom: 16px;
    }

    /* AI Tools Grid */
    .tools-grid {
      display: grid;
      gap: 12px;
    }

    .tool-card {
      background: rgba(31, 41, 55, 0.6);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      padding: 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      transition: all 0.2s ease;

    .tool-card:hover {
      background: rgba(31, 41, 55, 0.8);
      border-color: rgba(255, 255, 255, 0.2);
    }

    .tool-info {
      display: flex;
      align-items: center;
      gap: 12px;
      flex: 1;
    }

    .tool-icon {
      font-size: 24px;
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 8px;
      background: rgba(59, 130, 246, 0.1);
    }

    .tool-name {
      font-size: 15px;
      font-weight: 600;
      color: var(--text-primary);
    }

    .tool-actions {
      display: flex;
      align-items: center;
      gap: 12px;

    .status-badge {
      font-size: 11px;
      font-weight: 600;
      padding: 6px 12px;
      border-radius: 12px;
      text-transform: uppercase;
      letter-spacing: 0.03em;
      white-space: nowrap;

    .status-enabled {
      background: rgba(16, 185, 129, 0.15);
      color: #34d399;
      border: 1px solid rgba(16, 185, 129, 0.3);

    .status-disabled {
      background: rgba(100, 116, 139, 0.15);
      color: #94a3b8;
      border: 1px solid rgba(100, 116, 139, 0.3);
    }

    .doc-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      font-weight: 600;
      color: #ffffff;
      text-decoration: none;
      padding: 8px 16px;
      border-radius: 8px;
      background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
      border: 1px solid rgba(59, 130, 246, 0.5);
      transition: all 0.2s ease;
      white-space: nowrap;

    .doc-link:hover {

      border-color: rgba(59, 130, 246, 0.8);
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: rgba(31, 41, 55, 0.5); }
    ::-webkit-scrollbar-thumb { background: rgba(100, 116, 139, 0.5); border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(100, 116, 139, 0.7); }
  </style>

      }, []);

      const categories = useMemo(() => {
        const cats = new Set(CAPABILITIES_DATA.map(c => c.category));
        return ["All", ...Array.from(cats)].sort();
      }, []);

      // Filter capabilities
      const filteredCapabilities = useMemo(() => {
        return CAPABILITIES_DATA.filter(cap => {
          // Search filter
          if (searchTerm) {
            const search = searchTerm.toLowerCase();
            const matchesSearch =
              cap.department.toLowerCase().includes(search) ||
              cap.category.toLowerCase().includes(search) ||
              cap.capability.toLowerCase().includes(search) ||
              cap.description.toLowerCase().includes(search);
            if (!matchesSearch) return false;
          }

          // Department filter
          if (filterDepartment !== "All" && cap.department !== filterDepartment) {
            return false;
          }

          // Category filter
          if (filterCategory !== "All" && cap.category !== filterCategory) {
            return false;
          }

          return true;
        });
      }, [searchTerm, filterDepartment, filterCategory]);

      // Sort capabilities
      const sortedCapabilities = useMemo(() => {
        const sorted = [...filteredCapabilities];

        switch (sortBy) {
          case "department":
            sorted.sort((a, b) => a.department.localeCompare(b.department));
            break;
          case "category":
            sorted.sort((a, b) => a.category.localeCompare(b.category));
            break;
          case "capability":
            sorted.sort((a, b) => a.capability.localeCompare(b.capability));
            break;
          default:
            break;
        }

        return sorted;
      }, [filteredCapabilities, sortBy]);

      // Group capabilities by department and category
      const departmentData = useMemo(() => {
        const grouped = {};

        sortedCapabilities.forEach(cap => {
          if (!grouped[cap.department]) {
            grouped[cap.department] = {};
          }
          if (!grouped[cap.department][cap.category]) {
            grouped[cap.department][cap.category] = [];
          }
          grouped[cap.department][cap.category].push(cap);
        });

        return grouped;
      }, [sortedCapabilities]);

      const handleCapabilityClick = (capability) => {
        setSelectedCapability(capability);
      };

      const clearFilters = () => {
        setSearchTerm("");
        setFilterDepartment("All");
        setFilterCategory("All");
        setSortBy("department");
      };

      const hasActiveFilters = searchTerm || filterDepartment !== "All" || filterCategory !== "All" || sortBy !== "department";

      return (
        <div className="app">
          {/* Header */}
          <header className="header">
            <h1>AI Automation Capabilities Hub</h1>
            <p>
              {CAPABILITIES_DATA.length} capabilities across {departments.length - 1} departments •
              {AI_TOOLS.length} AI tools available
            </p>
          </header>

          {/* Search and Filters */}
          <div className="controls">
            {/* Search Bar */}
            <div className="search-bar">
              <span className="search-icon">🔍</span>
              <input
                type="text"
                className="search-input"
                placeholder="Search capabilities, departments, categories, or descriptions..."
                value={searchTerm}
                onChange={(e) => setSearchTerm(e.target.value)}
              />
            </div>

            {/* Filters */}
            <div className="filters-row">
              <div className="filter-group">
                <label className="filter-label">Department</label>
                <select
                  className="filter-select"
                  value={filterDepartment}
                  onChange={(e) => setFilterDepartment(e.target.value)}
                >
                  {departments.map(dept => (
                    <option key={dept} value={dept}>{dept}</option>
                  ))}
                </select>
              </div>

              <div className="filter-group">
                <label className="filter-label">Category</label>
                <select
                  className="filter-select"
                  value={filterCategory}
                  onChange={(e) => setFilterCategory(e.target.value)}
                >
                  {categories.map(cat => (
                    <option key={cat} value={cat}>{cat}</option>
                  ))}
                </select>
              </div>

              <div className="filter-group">
                <label className="filter-label">Sort By</label>
                <select
                  className="filter-select"
                  value={sortBy}
                  onChange={(e) => setSortBy(e.target.value)}
                >
                  <option value="department">Department</option>
                  <option value="category">Category</option>
                  <option value="capability">Capability Name</option>
                </select>
              </div>
            </div>

            {/* Results Bar */}
            <div className="results-bar">
              <div className="results-count">
                {filteredCapabilities.length} of {CAPABILITIES_DATA.length} capabilities
                {Object.keys(departmentData).length > 0 && ` • ${Object.keys(departmentData).length} departments`}
              </div>
              {hasActiveFilters && (
                <button className="clear-filters" onClick={clearFilters}>
                  ✕ Clear Filters
                </button>
              )}
            </div>
          </div>

          {/* Department Grid or No Results */}
          {Object.keys(departmentData).length === 0 ? (
            <div className="no-results">
              <div className="no-results-icon">🔍</div>
              <div className="no-results-title">No capabilities found</div>
              <div className="no-results-text">
                Try adjusting your search or filters to find what you're looking for
              </div>
              <button className="no-results-btn" onClick={clearFilters}>
                Clear all filters
              </button>
            </div>
          ) : (
            <div className="dept-grid">
              {Object.keys(departmentData).sort().map(deptName => {
                const dept = departmentData[deptName];
                const meta = DEPT_META[deptName];
                const totalCapabilities = Object.values(dept).flat().length;

                return (
                  <div
                    key={deptName}
                    className="dept-card"
                    style={{
                      '--dept-color-1': meta.colors[0],
                      '--dept-color-2': meta.colors[1],
                    }}
                  >
                    <div className="dept-header">
                      <div className="dept-icon">{meta.icon}</div>
                      <div>
                        <div className="dept-name">{deptName}</div>
                        <div className="dept-count">{totalCapabilities} capabilities</div>
                      </div>
                    </div>

                    {Object.keys(dept).map(categoryName => (
                      <div key={categoryName} className="category">
                        <div className="category-title">{categoryName}</div>
                        {dept[categoryName].map((cap, idx) => (
                          <div
                            key={idx}
                            className="capability"
                            onClick={() => handleCapabilityClick(cap)}
                          >
                            <div className="capability-name">{cap.capability}</div>
                            <div className="capability-desc">{cap.description}</div>
                          </div>
                        ))}
                      </div>
                    ))}
                  </div>
                );
              })}
            </div>
          )}

          {/* Modal */}
          {selectedCapability && (
            <CapabilityModal
              capability={selectedCapability}
              onClose={() => setSelectedCapability(null)}
              tools={AI_TOOLS}
            />
          )}
        </div>
      );
    }

    // CAPABILITY MODAL COMPONENT
    function CapabilityModal({ capability, onClose, tools }) {
      const deptMeta = DEPT_META[capability.department];

      const handleOverlayClick = (e) => {
        if (e.target === e.currentTarget) {
          onClose();
        }
      };

      // Separate enabled and disabled tools
      const enabledTools = tools.filter(t => t.enabled);
      const disabledTools = tools.filter(t => !t.enabled);

      return (
        <div className="modal-overlay" onClick={handleOverlayClick}>
          <div className="modal">
            <div className="modal-header">
              <button className="close-btn" onClick={onClose}>×</button>
              <div className="modal-title">{capability.capability}</div>
              <div className="modal-subtitle">
                {deptMeta.icon} {capability.department} • {capability.category}
              </div>
            </div>

            <div className="modal-body">
              {/* Description */}
              <div className="modal-section">
                <div className="section-title">Description</div>
                <p style={{ fontSize: '14px', color: 'var(--text-secondary)', lineHeight: '1.6' }}>
                  {capability.description}
                </p>
              </div>

              {/* Enabled AI Tools */}
              {enabledTools.length > 0 && (
                <div className="modal-section">
                  <div className="section-title">✅ Enabled AI Tools ({enabledTools.length})</div>
                  <div className="tools-grid">
                    {enabledTools.map(tool => (
                      <div key={tool.id} className="tool-card">
                        <div className="tool-info">
                          <div className="tool-icon">{tool.icon}</div>
                          <div>
                            <div className="tool-name">{tool.name}</div>
                            <div style={{ fontSize: '12px', color: 'var(--text-muted)', marginTop: '2px' }}>
                              {tool.category}
                            </div>
                          </div>
                        </div>

                        <div className="tool-actions">
                          <span className="status-badge status-enabled">Enabled</span>
                          <a
                            href={tool.docUrl}
                            className="doc-link"
                            target="_blank"
                            rel="noopener noreferrer"
                          >
                            📖 View Docs
                          </a>
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
              )}

              {/* Disabled AI Tools */}
              {disabledTools.length > 0 && (
                <div className="modal-section">
                  <div className="section-title">⚪ Not Available ({disabledTools.length})</div>
                  <div className="tools-grid">
                    {disabledTools.map(tool => (
                      <div key={tool.id} className="tool-card" style={{ opacity: 0.6 }}>
                        <div className="tool-info">
                          <div className="tool-icon" style={{ opacity: 0.5 }}>{tool.icon}</div>
                          <div>
                            <div className="tool-name">{tool.name}</div>
                            <div style={{ fontSize: '12px', color: 'var(--text-muted)', marginTop: '2px' }}>
                              {tool.category}
                            </div>
                          </div>
                        </div>

                        <div className="tool-actions">
                          <span className="status-badge status-disabled">Not Available</span>
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
              )}

              {/* Usage Instructions */}
              <div className="modal-section">
                <div className="section-title">Getting Started</div>
                <div style={{
                  background: 'rgba(59, 130, 246, 0.1)',
                  border: '1px solid rgba(59, 130, 246, 0.3)',
                  borderRadius: '12px',
                  padding: '16px',
                  fontSize: '13px',
                  color: 'var(--text-secondary)',
                  lineHeight: '1.6'
                }}>
                  <strong style={{ color: 'var(--accent-blue)', display: 'block', marginBottom: '8px' }}>
                    💡 How to use enabled tools
                  </strong>
                  1. Select an enabled AI tool from the list above<br/>
                  2. Click "📖 View Docs" to see integration guide<br/>
                  3. Follow setup instructions for your use case<br/>
                  4. Start automating this capability!
                </div>
              </div>
            </div>
          </div>
        </div>
      );
    }

    // RENDER
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<AIAutomationHub />);
  </script>
</body>
</html>
